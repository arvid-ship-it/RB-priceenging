<head>

<title>Rose &amp; Born · MTM Price Engine</title>
<style>
/*
 * ────────────────────────────────────────────────────────────────────────
 *  TYPOGRAPHY · OFFLINE-FIRST
 *
 *  Primary fonts use iOS-native typefaces (Hoefler Text + SF Pro)
 *  for a calm, heritage feel - 100% offline, zero network requests.
 *
 *  TO EMBED CUSTOM FONTS LATER (Cormorant Garamond, DM Sans, etc.):
 *    1. Download woff2 files (e.g. from gwfh.mranftl.com or fontsource.org)
 *    2. Convert each to base64 (in terminal):
 *         base64 -i cormorant-regular.woff2
 *    3. Add @font-face blocks here, e.g.:
 *         @font-face {
 *           font-family: 'Cormorant Garamond';
 *           font-weight: 400;
 *           src: url(data:font/woff2;base64,PASTE_BASE64_HERE) format('woff2');
 *           font-display: swap;
 *         }
 *    4. Update the font stacks below to put your custom font first.
 *
 *  Or - if hosting on a server (Cloudflare Pages etc.) - link a CSS file
 *  instead of inline base64 for a leaner HTML.
 * ────────────────────────────────────────────────────────────────────────
 */

:root {
--bg: #FFFFFF;
--bg-warm: #FAFAFA;
--surface: #FFFFFF;
--ink: #000000;
--ink-soft: #1A1A1A;
--muted: #666666;
--muted-soft: #999999;
--line: #E5E5E5;
--line-soft: #F0F0F0;
--accent: #000000;
--accent-soft: #4A4A4A;
--error: #8A2A1A;
}

- { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); }
  body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "Helvetica Neue", "Helvetica", "Segoe UI", Arial, sans-serif;
  font-weight: 400;
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
  }
  .app {
  max-width: 540px;
  margin: 0 auto;
  padding: 32px 22px 56px;
  padding-top: max(32px, env(safe-area-inset-top));
  padding-bottom: max(56px, env(safe-area-inset-bottom));
  }

/* ===== Brand header ===== */
.brand {
text-align: center;
padding: 8px 0 32px;
}
.brand .logo {
display: block;
height: 64px;
width: auto;
margin: 0 auto 18px;
max-width: 80%;
}

.brand .sub {
font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "Helvetica Neue", "Helvetica", "Segoe UI", Arial, sans-serif;
font-size: 9.5px;
font-weight: 500;
letter-spacing: 0.36em;
text-transform: uppercase;
color: var(--muted);
}

/* ===== Currency toggle: minimal text-only ===== */
.currency {
display: flex;
justify-content: center;
gap: 26px;
padding: 14px 0 28px;
border-top: 1px solid var(--line);
border-bottom: 1px solid var(--line);
margin-bottom: 32px;
}
.currency button {
background: transparent;
border: 0;
padding: 6px 0;
font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "Helvetica Neue", "Helvetica", "Segoe UI", Arial, sans-serif;
font-size: 11px;
font-weight: 500;
letter-spacing: 0.24em;
text-transform: uppercase;
color: var(--muted);
cursor: pointer;
position: relative;
transition: color 150ms ease;
}
.currency button.active {
color: var(--ink);
font-weight: 600;
}
.currency button.active::after {
content: '';
position: absolute;
bottom: -1px;
left: 50%;
transform: translateX(-50%);
width: 100%;
height: 1px;
background: var(--ink);
}

/* ===== Field labels (all-caps small) ===== */
.section-label {
font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "Helvetica Neue", "Helvetica", "Segoe UI", Arial, sans-serif;
font-size: 10px;
font-weight: 500;
letter-spacing: 0.28em;
text-transform: uppercase;
color: var(--muted);
margin-bottom: 10px;
}

/* ===== Product selector (premium dropdown style) ===== */
.product-select-wrap {
position: relative;
margin-bottom: 32px;
}
.product-select-wrap select {
width: 100%;
font-family: "Hoefler Text", "Cormorant Garamond", "Cormorant", "Iowan Old Style", "Big Caslon", Garamond, Georgia, serif;
font-size: 24px;
font-weight: 400;
color: var(--ink);
background: transparent;
border: 0;
border-bottom: 1px solid var(--line);
padding: 4px 32px 12px 0;
-webkit-appearance: none;
appearance: none;
background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2210%22%20height%3D%226%22%20viewBox%3D%220%200%2010%206%22%3E%3Cpath%20fill%3D%22none%22%20stroke%3D%22%23000000%22%20stroke-width%3D%221.2%22%20d%3D%22M1%201l4%204%204-4%22%2F%3E%3C%2Fsvg%3E");
background-repeat: no-repeat;
background-position: right 4px center;
cursor: pointer;
}
.product-select-wrap select:focus { outline: none; border-bottom-color: var(--ink); }

/* ===== Form fields ===== */
.form {
display: flex;
flex-direction: column;
gap: 22px;
margin-bottom: 36px;
}
.field {
display: flex;
flex-direction: column;
gap: 8px;
}
.field label {
font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "Helvetica Neue", "Helvetica", "Segoe UI", Arial, sans-serif;
font-size: 10px;
font-weight: 500;
letter-spacing: 0.26em;
text-transform: uppercase;
color: var(--muted);
}
.field select, .field input[type="number"], .field input[type="text"] {
font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "Helvetica Neue", "Helvetica", "Segoe UI", Arial, sans-serif;
font-size: 15px;
font-weight: 400;
color: var(--ink);
background: transparent;
border: 0;
border-bottom: 1px solid var(--line);
padding: 8px 28px 10px 0;
-webkit-appearance: none;
appearance: none;
background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2210%22%20height%3D%226%22%20viewBox%3D%220%200%2010%206%22%3E%3Cpath%20fill%3D%22none%22%20stroke%3D%22%238A8074%22%20stroke-width%3D%221.2%22%20d%3D%22M1%201l4%204%204-4%22%2F%3E%3C%2Fsvg%3E");
background-repeat: no-repeat;
background-position: right 2px center;
cursor: pointer;
transition: border 150ms ease;
}
.field input[type="number"], .field input[type="text"] {
background-image: none;
padding-right: 0;
cursor: text;
}
.field select:focus, .field input:focus { outline: none; border-bottom-color: var(--ink); }

/* ===== Subsection (kombo header) ===== */
.subsection {
font-family: "Hoefler Text", "Cormorant Garamond", "Cormorant", "Iowan Old Style", "Big Caslon", Garamond, Georgia, serif;
font-style: italic;
font-weight: 500;
font-size: 18px;
color: var(--accent);
letter-spacing: 0.02em;
padding-top: 12px;
margin-bottom: 2px;
}

/* ===== Options grid (knit) ===== */
.options-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 1px;
background: var(--line);
border-top: 1px solid var(--line);
border-bottom: 1px solid var(--line);
margin-top: 2px;
}
.option-toggle {
display: flex;
align-items: center;
gap: 12px;
padding: 14px 12px;
background: var(--bg);
cursor: pointer;
transition: background 150ms ease;
font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "Helvetica Neue", "Helvetica", "Segoe UI", Arial, sans-serif;
font-size: 13px;
color: var(--ink-soft);
user-select: none;
-webkit-tap-highlight-color: transparent;
}
.option-toggle.on { background: var(--ink); color: var(--bg); }
.option-toggle .check {
width: 13px; height: 13px;
border: 1px solid var(--muted-soft);
border-radius: 0;
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: center;
transition: all 150ms ease;
}
.option-toggle.on .check { background: var(--bg); border-color: var(--bg); }
.option-toggle.on .check::after {
content: '';
width: 6px; height: 3px;
border-left: 1.5px solid var(--ink);
border-bottom: 1.5px solid var(--ink);
transform: rotate(-45deg) translate(1px, -1px);
}
.note {
font-family: "Hoefler Text", "Cormorant Garamond", "Cormorant", "Iowan Old Style", "Big Caslon", Garamond, Georgia, serif;
font-style: italic;
font-size: 13px;
color: var(--muted);
padding: 4px 0;
line-height: 1.4;
}

/* ===== Price card - like a couture label tag ===== */
.price-wrap {
margin: 24px 0 18px;
}
.price-card {
background: var(--ink);
color: var(--bg);
padding: 40px 28px 36px;
text-align: center;
position: relative;
border-radius: 2px;
}
.price-card::before, .price-card::after {
content: '';
position: absolute;
left: 50%;
transform: translateX(-50%);
width: 18px;
height: 1px;
background: var(--muted-soft);
opacity: 0.4;
}
.price-card::before { top: 16px; }
.price-card::after { bottom: 16px; }

.price-card .label {
font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "Helvetica Neue", "Helvetica", "Segoe UI", Arial, sans-serif;
font-size: 9.5px;
font-weight: 500;
letter-spacing: 0.36em;
text-transform: uppercase;
color: var(--muted-soft);
margin-bottom: 18px;
}
.price-card .value {
font-family: "Hoefler Text", "Cormorant Garamond", "Cormorant", "Iowan Old Style", "Big Caslon", Garamond, Georgia, serif;
font-weight: 300;
font-size: 56px;
letter-spacing: -0.01em;
line-height: 1.02;
font-variant-numeric: tabular-nums;
}
.price-card .value .currency-sym {
font-size: 26px;
font-weight: 300;
vertical-align: 14px;
margin-right: 6px;
color: var(--muted-soft);
}
.price-card .value .currency-suffix {
font-size: 22px;
font-weight: 400;
font-style: italic;
margin-left: 8px;
color: var(--muted-soft);
}
.price-card .meta {
margin-top: 16px;
font-family: "Hoefler Text", "Cormorant Garamond", "Cormorant", "Iowan Old Style", "Big Caslon", Garamond, Georgia, serif;
font-style: italic;
font-size: 13px;
color: var(--muted-soft);
letter-spacing: 0.02em;
}
.price-card.empty { background: transparent; color: var(--muted); border: 1px solid var(--line); }
.price-card.empty::before, .price-card.empty::after { background: var(--line); opacity: 1; }
.price-card.empty .label { color: var(--muted); }
.price-card.empty .value {
font-style: italic;
font-size: 24px;
color: var(--muted);
}
.price-card.empty .meta { color: var(--muted); }
.price-card.error { background: var(--surface); color: var(--error); border: 1px solid var(--error); }
.price-card.error::before, .price-card.error::after { background: var(--error); opacity: 0.3; }
.price-card.error .label { color: var(--error); letter-spacing: 0.32em; }
.price-card.error .value {
font-family: "Hoefler Text", "Cormorant Garamond", "Cormorant", "Iowan Old Style", "Big Caslon", Garamond, Georgia, serif;
font-style: italic;
font-weight: 400;
font-size: 17px;
letter-spacing: 0;
line-height: 1.4;
padding: 0 4px;
}

/* ===== Details accordion ===== */
.details {
margin-top: 8px;
}
.details summary {
cursor: pointer;
font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "Helvetica Neue", "Helvetica", "Segoe UI", Arial, sans-serif;
font-size: 10px;
font-weight: 500;
letter-spacing: 0.26em;
text-transform: uppercase;
color: var(--muted);
padding: 14px 0;
list-style: none;
display: flex;
align-items: center;
justify-content: space-between;
border-top: 1px solid var(--line-soft);
border-bottom: 1px solid var(--line-soft);
}
.details summary::-webkit-details-marker { display: none; }
.details summary::after {
content: '+';
font-family: "Hoefler Text", "Cormorant Garamond", "Cormorant", "Iowan Old Style", "Big Caslon", Garamond, Georgia, serif;
font-size: 16px;
font-weight: 400;
transition: transform 200ms ease;
}
.details[open] summary::after { content: '−'; }
.breakdown {
margin-top: 18px;
padding-bottom: 18px;
font-size: 13px;
display: grid;
grid-template-columns: auto 1fr;
gap: 8px 16px;
font-variant-numeric: tabular-nums;
}
.breakdown .bk-label {
font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "Helvetica Neue", "Helvetica", "Segoe UI", Arial, sans-serif;
color: var(--muted);
font-size: 12px;
}
.breakdown .bk-value {
font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "Helvetica Neue", "Helvetica", "Segoe UI", Arial, sans-serif;
text-align: right;
font-weight: 500;
color: var(--ink-soft);
}
.breakdown .bk-divider {
grid-column: 1 / -1;
border-top: 1px solid var(--line-soft);
margin: 6px 0;
}
.breakdown .bk-final { font-weight: 600; color: var(--ink); font-size: 13px; }
.breakdown .bk-final.bk-value { font-family: "Hoefler Text", "Cormorant Garamond", "Cormorant", "Iowan Old Style", "Big Caslon", Garamond, Georgia, serif; font-size: 18px; font-weight: 500; }

/* ===== Footer ===== */
.footer {
margin-top: 56px;
text-align: center;
}
.footer .ornament {
font-family: "Hoefler Text", "Cormorant Garamond", "Cormorant", "Iowan Old Style", "Big Caslon", Garamond, Georgia, serif;
color: var(--muted-soft);
font-size: 14px;
margin-bottom: 8px;
}
.footer .cities {
font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "Helvetica Neue", "Helvetica", "Segoe UI", Arial, sans-serif;
font-size: 9.5px;
font-weight: 500;
letter-spacing: 0.32em;
text-transform: uppercase;
color: var(--muted);
}
.footer .since {
font-family: "Hoefler Text", "Cormorant Garamond", "Cormorant", "Iowan Old Style", "Big Caslon", Garamond, Georgia, serif;
font-style: italic;
font-size: 12px;
color: var(--muted-soft);
margin-top: 6px;
}

@keyframes fadeUp {
from { opacity: 0; transform: translateY(8px); }
to { opacity: 1; transform: translateY(0); }
}
.price-card { animation: fadeUp 280ms cubic-bezier(0.16, 1, 0.3, 1); }

@media (max-width: 420px) {
.app { padding: 24px 18px 48px; }
.price-card .value { font-size: 44px; }
.price-card .value .currency-sym { font-size: 21px; vertical-align: 10px; }
.price-card .value .currency-suffix { font-size: 17px; }
.options-grid { grid-template-columns: 1fr; }
.product-select-wrap select { font-size: 21px; }
}

        if (p.make === 'hm') { push('Handmade surcharge', SHIRT_HM); total += SHIRT_HM; }
        withAdds = total;

      }
      case 'rock': {
        if (!p.pc || !p.typ) return { error: 'incomplete' };
        const shclErr = checkSHCL(p.pc); if (shclErr) return shclErr;
        // For CL, coat prices vary by construction; default to HC
        const ink = getPrice('coats', p.pc, p.typ);
        if (ink == null) return { error: 'unavailable' };
        push('Cost ' + p.typ, ink);
        withAdds = ink;
        break;

        if (p.pc.startsWith('CM CL')) return { error: 'unavailable', msg: 'Jeans/Chinos not available in CL price list' };
        const ink = getPrice('jeans', p.pc, p.typ);

        let total = ink;
        if (p.make === 'sart') { push('Sartorial surcharge', SART); total += SART; }
        withAdds = total;
        break;
      }
      case 'stickat': {
        if (!p.yarn || !p.model) return { error: 'incomplete' };
        const o = p.options || {};
        const ribCableYarns = ['Wool-Cashmere (PC10)','Cashmere (PC16)'];
        const starredModels = ['Full button bomber*','Full button shawl collar*','Leisure pants*'];
        const starredYarns = ['Wool-Cashmere (PC10)','Cashmere (PC16)'];
        if (o.eng_rib && !ribCableYarns.includes(p.yarn))
          return { error: 'invalid', msg: 'English half rib is only available in Wool-Cashmere (PC10) or Cashmere (PC16).' };
        if (o.cable_knit && !ribCableYarns.includes(p.yarn))
          return { error: 'invalid', msg: 'Cable knit is only available in Wool-Cashmere (PC10) or Cashmere (PC16).' };
        if (starredModels.includes(p.model) && !starredYarns.includes(p.yarn))
          return { error: 'invalid', msg: p.model + ' is only available in Wool-Cashmere (PC10) or Cashmere (PC16).' };
        const ink = safeNum(_g((lookupCur === 'USD' ? DATA.prices.USD : DATA.prices.EUR), 'knit', p.model, p.yarn));
        if (ink == null) return { error: 'unavailable' };
        push('Cost ' + p.model, ink);
        let total = ink;
        const addOpt = (k, label) => {
          if (!o[k]) return;
          const v = (typeof A[k] === 'number') ? A[k] : (A[k][p.yarn] || 0);
          push(label, v); total += v;
        };
        addOpt('eng_rib', 'English half rib');
        addOpt('cable_knit', 'Cable knit');
        addOpt('double_yarn', 'Double yarn');
        addOpt('short_sleeves', 'Short sleeves (discount)');
        addOpt('no_sleeves', 'No sleeves (discount)');
        // Automatic button surcharge based on model
        const autoBtn = autoButtonsForModel(p.model);
        if (autoBtn === 'suit') {
          const v = (typeof A.suit_buttons === 'number') ? A.suit_buttons : (A.suit_buttons[p.yarn] || 0);
          push('Suit buttons (auto)', v); total += v;
        } else if (autoBtn === 'shirt') {
          const v = (typeof A.shirt_buttons === 'number') ? A.shirt_buttons : (A.shirt_buttons[p.yarn] || 0);
          push('Shirt buttons (auto)', v); total += v;
        }
        withAdds = total;
        break;
      }
            case 'shoes': {
        if (!p.origin || !p.construction || !p.model || !p.pc) return { error: 'incomplete' };
        const cur = lookupCur;
        const shoeData = cur === 'USD' ? DATA.prices.USD.shoes : DATA.prices.EUR.shoes;
        const ink = shoeData && shoeData[p.origin] && shoeData[p.origin][p.construction]
          && shoeData[p.origin][p.construction][p.model] && shoeData[p.origin][p.construction][p.model][p.pc];
        if (ink == null) return { error: 'unavailable' };
        push('Cost ' + p.origin + ' ' + p.construction + ' ' + p.model + ' (' + p.pc + ')', ink);
        withAdds = ink;
        break;
      }
      case 'belt': {
        if (!p.origin) return { error: 'incomplete' };
        const cur = lookupCur;
        const beltData = cur === 'USD' ? DATA.prices.USD.belt : DATA.prices.EUR.belt;
        const ink = beltData && beltData[p.origin];
        if (ink == null) return { error: 'unavailable' };
        push('Cost belt (' + p.origin + ')', ink);
        withAdds = ink;
        break;
      }
      default: return { error: 'incomplete' };
    }

    if (withAdds == null) return { error: 'incomplete' };

    // Apply market-specific currency conversion + VAT + rounding on FINAL price
    // Rounding mode: nearest (Math.round), step from settings (round_USD / round_SEK / round_CHF).
    if (state.market === 'USA') {
      let target = withAdds / (1 - getEffectiveTB(product));   // pre-tax sales price
      let bs = (p.bigSize && p.bigSize > 0) ? p.bigSize : 0;
      let preRound = target + bs;
      let final = Math.round(preRound / S.round_USD) * S.round_USD;
      // Back-compute "rounded ex bigsize" for breakdown
      let rounded = final - bs;
      return { price: final, currency: 'USD', detail, withAdds, target };
    } else if (state.market === 'Stockholm') {
      let sekTarget = withAdds * S.EUR_to_SEK / (1 - getEffectiveTB(product));
      let total = sekTarget * (1 + S.moms);   // incl VAT
      let bs = (p.bigSize && p.bigSize > 0) ? p.bigSize : 0;
      let final = Math.round((total + bs) / S.round_SEK) * S.round_SEK;
      // Back-compute components from rounded final for display
      let finalExBS = final - bs;
      let sekEx = finalExBS / (1 + S.moms);
      let moms = finalExBS - sekEx;
      return { price: final, sekExMoms: sekEx, moms, currency: 'SEK', detail, withAdds };
    } else if (state.market === 'Zurich') {
      let chfTarget = withAdds * S.EUR_to_CHF / (1 - getEffectiveTB(product));
      let total = chfTarget * (1 + (S.vat_CHF || 0));
      let bs = (p.bigSize && p.bigSize > 0) ? p.bigSize : 0;
      let final = Math.round((total + bs) / S.round_CHF) * S.round_CHF;
      let finalExBS = final - bs;
      let chfEx = finalExBS / (1 + (S.vat_CHF || 0));
      let vat = finalExBS - chfEx;
      return { price: final, sekExMoms: chfEx, moms: vat, currency: 'CHF', detail, withAdds };
    }
    return { error: 'incomplete' };
  } catch (err) {
    console.error('calcPrice error', err);
    return { error: 'incomplete' };
  }
}

const state = {
  market: 'USA',
  currency: 'USD',
  product: 'kostym',
  inputs: {},
  bigSize: 0,
};

function marketCurrency(m) {
  return (MARKETS[m] && MARKETS[m].currency) || 'USD';
}

// Currency used in price lookup (USD for USA, EUR for Stockholm/Zurich)
function lookupCurrency() {
  return state.market === 'USA' ? 'USD' : 'EUR';
}

// Effective TB for current market and given product
function getEffectiveTB(product) {
  const S = DATA.settings;
  if (S.tb_map && S.tb_map[state.market] && typeof S.tb_map[state.market][product] === 'number') {
    return S.tb_map[state.market][product];
  }
  return S.TB || 0.75;
}

// Effective rounding for current market
function getRounding() {
  const S = DATA.settings;
  if (state.market === 'USA') return S.round_USD || 50;
  if (state.market === 'Stockholm') return S.round_SEK || 500;
  if (state.market === 'Zurich') return S.round_CHF || 50;
  return 50;
}

// Effective VAT
function getVAT() {
  const S = DATA.settings;
  if (state.market === 'Stockholm') return S.moms || 0;
  if (state.market === 'Zurich') return S.vat_CHF || 0;
  return 0;
}

function getInputs() {
  if (!state.inputs[state.product]) state.inputs[state.product] = {};
  return state.inputs[state.product];
}

// ============================================================
// DOM HELPERS
// ============================================================
function el(tag, attrs, children) {
  attrs = attrs || {}; children = children || [];
  const e = document.createElement(tag);
  for (const k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else if (k.startsWith('on')) e.addEventListener(k.substring(2).toLowerCase(), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  (Array.isArray(children) ? children : [children]).forEach(c => {
    if (c == null) return;
    if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(String(c)));
    else e.appendChild(c);
  });
  return e;
}
function selectField(label, options, value, onChange) {
  const sel = el('select', { onchange: e => onChange(e.target.value) });
  sel.appendChild(el('option', { value: '' }, '— Select —'));
  options.forEach(opt => {
    const o = el('option', { value: opt.v }, opt.t);
    if (opt.v === value) o.selected = true;
    sel.appendChild(o);
  });
  return el('div', { class: 'field' }, [el('label', {}, label), sel]);
}
function pcSelect(label, list, value, onChange) {
  return selectField(label, list.map(pc => ({ v: pc, t: pc })), value, onChange);
}
function optionToggle(label, on, onChange) {
  return el('div', {
    class: 'option-toggle' + (on ? ' on' : ''),
    onclick: () => onChange(!on),
  }, [el('div', { class: 'check' }), el('span', {}, label)]);
}

function fabricSelect(label, plList, value, onChange, opts) {
  // opts: { keyPrefix: 'pc' }  — used to store fabricMode/vendor/search per field in p
  opts = opts || {};

  const kp = opts.keyPrefix || 'pc';
  const modeKey = kp + '_fmode';   // 'PL' or 'CL'
  const vendorKey = kp + '_vendor';
  const searchKey = kp + '_search';
  const codeKey = kp + '_code';    // selected display code (for showing in field)

  if (!p[modeKey]) p[modeKey] = 'PL';
  const mode = p[modeKey];

  // Tab toggle
  const tabs = el('div', { class: 'fmode-tabs' }, [
    el('button', {
      class: 'fmode-tab' + (mode === 'PL' ? ' active' : ''),
      type: 'button',
      onclick: () => { p[modeKey] = 'PL'; onChange(p[kp + '_pl_value'] || ''); rerender(); }
    }, 'House fabrics (PL)'),
    el('button', {
      class: 'fmode-tab' + (mode === 'CL' ? ' active' : ''),
      type: 'button',
      onclick: () => { p[modeKey] = 'CL'; onChange(p[kp + '_cl_value'] || ''); rerender(); }
    }, 'Cut Length (CL)'),
  ]);

        p[kp + '_pl_value'] = e.target.value;
        onChange(e.target.value);
      }
    });

    plList.forEach(pc => {
      const o = el('option', { value: pc }, pc);
      if (pc === value) o.selected = true;
      sel.appendChild(o);
    });
    fields.push(sel);
  } else {
    // CL: vendor dropdown + (search OR direct PC select)
    const vendor = p[vendorKey] || '';
    const vendorSel = el('select', {
      onchange: e => {
        p[vendorKey] = e.target.value;
        p[searchKey] = '';
        p[codeKey] = '';
        p[kp + '_cl_value'] = '';
        onChange('');
        rerender();
      }
    });
    vendorSel.appendChild(el('option', { value: '' }, '— Select supplier —'));
    [
      { v: 'direct', t: 'CL price group (direct)' },
      { v: 'Ariston', t: 'Ariston' },
      { v: 'Caccioppoli', t: 'Caccioppoli' },
      { v: 'Canclini', t: 'Canclini' },
      { v: 'Carnet', t: 'Carnet' },
      { v: 'Dormeuil', t: 'Dormeuil' },
      { v: 'Drago', t: 'Drago' },
      { v: 'Drapers', t: 'Drapers' },
      { v: 'Holland & Sherry', t: 'Holland & Sherry' },
      { v: 'Loro Piana', t: 'Loro Piana' },
      { v: 'Piacenza', t: 'Piacenza' },
      { v: 'Reda', t: 'Reda' },
      { v: 'Solbiati', t: 'Solbiati' },
      { v: 'Thomas Mason', t: 'Thomas Mason' },
    ].forEach(opt => {
      const o = el('option', { value: opt.v }, opt.t);
      if (opt.v === vendor) o.selected = true;
      vendorSel.appendChild(o);
    });
    fields.push(vendorSel);

    if (vendor === 'direct') {
      // Show CL PC dropdown
      const sel = el('select', {
        onchange: e => {
          p[kp + '_cl_value'] = e.target.value;
          p[codeKey] = e.target.value;
          onChange(e.target.value);
        }
      });
      sel.appendChild(el('option', { value: '' }, '— Select CL group —'));
      PC_LISTS.cl.forEach(pc => {
        const o = el('option', { value: pc }, pc);
        if (pc === value) o.selected = true;
        sel.appendChild(o);
      });
      fields.push(sel);
    } else if (vendor && vendor !== 'direct' && VENDORS[vendor]) {
      const prefix = vendor === 'Loro Piana' ? 'LPN' : '';
      const placeholder = vendor === 'Loro Piana'
        ? 'Enter fabric number (e.g. 776021)'
        : 'Enter fabric code (e.g. A579/16)';

      // Search input
      const searchInput = el('input', {
        type: 'text',
        placeholder: placeholder,
        autocomplete: 'off',
        value: p[searchKey] || '',
        oninput: e => {
          p[searchKey] = e.target.value;
          renderSearchResults(vendor, e.target.value, kp, onChange);
        }
      });
      fields.push(searchInput);

      // Results container
      const resultsId = 'fabric-results-' + kp;
      fields.push(el('div', { id: resultsId, class: 'fabric-results' }));

      // Show currently selected
      if (p[codeKey]) {
        const displayCode = vendor === 'Loro Piana' ? 'LPN' + p[codeKey].replace(/^LPN/, '') : p[codeKey];
        const pcLabel = p[kp + '_cl_value'] || '';
        fields.push(el('div', { class: 'fabric-selected' }, [
          el('span', { class: 'fab-code' }, displayCode),
          el('span', { class: 'fab-pc' }, pcLabel),
        ]));
      }
    }
  }

  return el('div', { class: 'field' }, fields);
}

function renderSearchResults(vendor, query, keyPrefix, onChange) {
  const resultsId = 'fabric-results-' + keyPrefix;
  const container = document.getElementById(resultsId);
  if (!container) return;
  container.innerHTML = '';
  const q = (query || '').trim().toUpperCase();
  if (q.length < 2) return;

  const vendorData = VENDORS[vendor];
  if (!vendorData) return;
  const matches = [];
  const maxResults = 50;
  // SHCL fabrics (LP shirt cut-length) only relevant for shirts
  const allowSHCL = state.product === 'skjorta';
  outer: for (const pc in vendorData) {
    if (!allowSHCL && pc.indexOf('SHCL') >= 0) continue;
    for (const code of vendorData[pc]) {
      if (code.toUpperCase().indexOf(q) >= 0) {
        matches.push({ code, pc });
        if (matches.length >= maxResults) break outer;
      }
    }
  }

  if (matches.length === 0) {
    container.appendChild(el('div', { class: 'fabric-empty' }, 'No matches for "' + query + '"'));
    return;
  }

  matches.forEach(m => {
    const displayCode = vendor === 'Loro Piana' ? 'LPN' + m.code : m.code;
    const row = el('div', { class: 'fabric-row' }, [
      el('span', { class: 'fab-code' }, displayCode),
      el('span', { class: 'fab-pc' }, m.pc),
    ]);
    row.addEventListener('click', () => {
      const p = getInputs();
      p[keyPrefix + '_code'] = displayCode;
      p[keyPrefix + '_cl_value'] = m.pc;
      p[keyPrefix + '_search'] = displayCode;
      onChange(m.pc);
    });
    container.appendChild(row);
  });
}

function fmtMoney(v, cur) {
  if (v == null || !isFinite(v)) return '—';
  const r = Math.round(v);
  const num = r.toLocaleString('en-US').replace(/,/g, ' ');
  if (cur === 'USD') return '$' + num;
  if (cur === 'CHF') return 'CHF ' + num;
  if (cur === 'SEK') return num + ' kr';
  if (cur === 'EUR') return '€' + num;
  return num;
}

function renderPrice() {
  const sec = document.getElementById('price-section');
  sec.innerHTML = '';
  const p = Object.assign({}, getInputs(), { bigSize: state.bigSize });
  const result = calcPrice(state.currency, state.product, p);

  if (result.error === 'incomplete') {
    const card = el('section', { class: 'price-card empty' }, [
      el('div', { class: 'label' }, 'Price · Pending'),
      el('div', { class: 'value' }, 'Fill in all selections'),
      el('div', { class: 'meta' }, 'Select fabric, make and other options.'),
    ]);
    sec.appendChild(card);
    document.getElementById('details').style.display = 'none';
    return;
  }
  if (result.error === 'unavailable') {
    const msg = result.msg || 'This combination is not in the price list.';
    const card = el('section', { class: 'price-card empty' }, [
      el('div', { class: 'label' }, 'Not available'),
      el('div', { class: 'value' }, '—'),
      el('div', { class: 'meta' }, msg),
    ]);
    sec.appendChild(card);
    document.getElementById('details').style.display = 'none';
    return;
  }
  if (result.error === 'invalid') {
    const card = el('section', { class: 'price-card error' }, [
      el('div', { class: 'label' }, 'Invalid combination'),
      el('div', { class: 'value' }, result.msg || 'Please check your selections.'),
    ]);
    sec.appendChild(card);
    document.getElementById('details').style.display = 'none';
    return;
  }

  const cur = result.currency;
  const r = Math.round(result.price);
  const formattedNum = r.toLocaleString('en-US').replace(/,/g, ' ');
  let valueNode;
  if (cur === 'USD') {
    valueNode = el('div', { class: 'value' }, [
      el('span', { class: 'currency-sym' }, '$'),
      formattedNum,
    ]);
  } else if (cur === 'CHF') {
    valueNode = el('div', { class: 'value' }, [
      el('span', { class: 'currency-sym' }, 'CHF '),
      formattedNum,
    ]);
  } else {
    valueNode = el('div', { class: 'value' }, [
      formattedNum,
      el('span', { class: 'currency-suffix' }, 'kr'),
    ]);
  }
  let meta;
  if (cur === 'USD') meta = 'Customer price · excl. NYC sales tax';
  else if (cur === 'SEK') meta = 'Customer price · incl. VAT ' + Math.round(DATA.settings.moms * 100) + '%';
  else meta = 'Customer price · incl. VAT ' + (DATA.settings.vat_CHF * 100).toFixed(1) + '%';

  sec.appendChild(el('section', { class: 'price-card' }, [
    el('div', { class: 'label' }, 'Customer Price'),
    valueNode,
    el('div', { class: 'meta' }, meta),
  ]));

  // Details
  document.getElementById('details').style.display = '';
  const bd = document.getElementById('breakdown');
  bd.innerHTML = '';
  const lookupCur = lookupCurrency();
  const symFor = (v) => lookupCur === 'USD'
    ? ('$' + Math.round(v).toLocaleString('en-US'))
    : ('€' + Math.round(v).toLocaleString('en-US'));
  result.detail.components.forEach(([lbl, val]) => {
    bd.appendChild(el('div', { class: 'bk-label' }, lbl));
    bd.appendChild(el('div', { class: 'bk-value' }, symFor(val)));
  });
  bd.appendChild(el('div', { class: 'bk-divider' }));
  bd.appendChild(el('div', { class: 'bk-label' }, 'Total cost'));
  bd.appendChild(el('div', { class: 'bk-value' }, symFor(result.withAdds)));

  if (cur === 'USD') {
    bd.appendChild(el('div', { class: 'bk-label' }, 'Sales price @ ' + Math.round(getEffectiveTB(state.product) * 100) + ' % TB'));
    bd.appendChild(el('div', { class: 'bk-value' }, '$' + Math.round(result.target).toLocaleString('en-US')));
    bd.appendChild(el('div', { class: 'bk-label' }, 'Final · rounded to nearest $' + DATA.settings.round_USD));
    bd.appendChild(el('div', { class: 'bk-value' }, fmtMoney(result.price - (state.bigSize || 0), cur)));
  } else if (cur === 'SEK') {
    bd.appendChild(el('div', { class: 'bk-label' }, 'SEK ex VAT (back-calculated)'));
    bd.appendChild(el('div', { class: 'bk-value' }, fmtMoney(result.sekExMoms, cur)));
    bd.appendChild(el('div', { class: 'bk-label' }, 'VAT ' + Math.round(DATA.settings.moms * 100) + ' %'));
    bd.appendChild(el('div', { class: 'bk-value' }, fmtMoney(result.moms, cur)));
  } else if (cur === 'CHF') {
    bd.appendChild(el('div', { class: 'bk-label' }, 'CHF ex VAT (back-calculated)'));
    bd.appendChild(el('div', { class: 'bk-value' }, fmtMoney(result.sekExMoms, cur)));
    bd.appendChild(el('div', { class: 'bk-label' }, 'VAT ' + (DATA.settings.vat_CHF * 100).toFixed(1) + ' %'));
    bd.appendChild(el('div', { class: 'bk-value' }, fmtMoney(result.moms, cur)));
  }
  if (state.bigSize > 0) {
    bd.appendChild(el('div', { class: 'bk-label' }, 'Big Size surcharge'));
    bd.appendChild(el('div', { class: 'bk-value' }, fmtMoney(state.bigSize, cur)));
  }
  bd.appendChild(el('div', { class: 'bk-divider' }));
  bd.appendChild(el('div', { class: 'bk-label bk-final' }, 'Final price' + (
    cur === 'USD' ? ' (rounded to $' + DATA.settings.round_USD + ')' :
    cur === 'SEK' ? ' (rounded to ' + DATA.settings.round_SEK + ' kr, incl VAT)' :
    cur === 'CHF' ? ' (rounded to CHF ' + DATA.settings.round_CHF + ', incl VAT)' : ''
)));
  bd.appendChild(el('div', { class: 'bk-value bk-final' }, fmtMoney(result.price, cur)));
}

function rerender() {
  renderProductSelect();
  renderForm();
  renderPrice();
}

function adminRow(key, label, unit) {
  const S = DATA.settings;

  wrap.appendChild(inp);
  wrap.appendChild(el('span', { class: 'unit' }, unit || ''));
  return wrap;
}

function saveAdmin() {
  // Save scalar settings
  document.querySelectorAll('#admin-body input[data-key]').forEach(inp => {
    const k = inp.dataset.key;
    const v = parseFloat(inp.value);
    if (!isNaN(v) && k) DATA.settings[k] = v;
  });
  // Save TB map
  document.querySelectorAll('#admin-body input[data-tb-mkt]').forEach(inp => {
    const mkt = inp.dataset.tbMkt;
    const prod = inp.dataset.tbProd;
    const v = parseFloat(inp.value);
    if (!isNaN(v)) {
      if (!DATA.settings.tb_map) DATA.settings.tb_map = {};
      if (!DATA.settings.tb_map[mkt]) DATA.settings.tb_map[mkt] = {};
      DATA.settings.tb_map[mkt][prod] = v;
    }
  });
  // Persist
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA.settings));
    const msg = document.getElementById('admin-msg');
    if (msg) msg.textContent = 'Saved · ' + new Date().toLocaleTimeString('en-GB');
  } catch(e) {
    const msg = document.getElementById('admin-msg');
    if (msg) msg.textContent = 'Save error: ' + e.message;
  }
  rerender();
}

function resetAdmin() {
  if (!confirm('Reset ALL settings to defaults? This will reload the page.')) return;
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  location.reload();
}

function fetchRates() {
  const info = document.getElementById('admin-fetch-info');
  if (info) info.textContent = 'Fetching from ECB…';
  fetch('https://api.frankfurter.app/latest?from=EUR&to=SEK,CHF,USD')
    .then(r => r.json())
    .then(data => {
      if (data && data.rates) {
        if (data.rates.SEK) {
          DATA.settings.EUR_to_SEK = +data.rates.SEK.toFixed(2);
          const inp = document.querySelector('input[data-key="EUR_to_SEK"]');
          if (inp) inp.value = DATA.settings.EUR_to_SEK;
        }
        if (data.rates.CHF) {
          DATA.settings.EUR_to_CHF = +data.rates.CHF.toFixed(3);
          const inp = document.querySelector('input[data-key="EUR_to_CHF"]');
          if (inp) inp.value = DATA.settings.EUR_to_CHF;
        }
        const date = data.date || new Date().toISOString().slice(0,10);
        DATA.settings.rates_updated = date;
        if (info) info.textContent = 'Updated from ECB · ' + date + ' · click Save to persist';
      } else {
        if (info) info.textContent = 'Could not parse ECB response';
      }
    })
    .catch(err => { if (info) info.textContent = 'Error: ' + err.message + ' (needs internet)'; });
}

  const input = document.getElementById('admin-pin-input');
  if (input.value === ADMIN_PIN) {
    document.getElementById('admin-pin-gate').classList.remove('open');

  } else {

    input.value = '';
    input.focus();
  }
}

document.getElementById('admin-trigger').addEventListener('click', openAdmin);
document.getElementById('admin-pin-cancel').addEventListener('click', () => {
  document.getElementById('admin-pin-gate').classList.remove('open');
});
document.getElementById('admin-pin-submit').addEventListener('click', tryUnlock);
document.getElementById('admin-pin-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryUnlock();
});
document.getElementById('admin-close').addEventListener('click', () => {
  document.getElementById('admin-overlay').classList.remove('open');
});
document.getElementById('admin-save').addEventListener('click', saveAdmin);
document.getElementById('admin-reset').addEventListener('click', resetAdmin);
document.getElementById('admin-overlay').addEventListener('click', e => {
  if (e.target.id === 'admin-overlay') {
    document.getElementById('admin-overlay').classList.remove('open');
  }
});

rerender();
</script>


</body>
</html>
